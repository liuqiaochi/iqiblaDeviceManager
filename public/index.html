                renderAttributeSelection(version.functions);
            }

            document.getElementById('editVersionModal').classList.add('active');
        }

        // 切换功能选择
        function toggleFunctionSelection(card, functionId) {
            card.classList.toggle('selected');
            
            // 先从当前 DOM 中收集已选属性状态，避免刷新时丢失
            const currentAttrSelections = {};
            document.querySelectorAll('#attributeSelectionArea [data-attr-id].selected').forEach(c => {
                const fid = c.dataset.functionId;
                if (!currentAttrSelections[fid]) currentAttrSelections[fid] = [];
                currentAttrSelections[fid].push(c.dataset.attrId);
            });
            
            const selectedCards = document.querySelectorAll('#functionSelectionGrid .selection-card.selected');
            const selectedFunctions = Array.from(selectedCards).map(c => ({
                functionId: c.dataset.functionId,
                selectedAttrIds: currentAttrSelections[c.dataset.functionId] || []
            }));
            
            renderAttributeSelection(selectedFunctions);
        }

        // 渲染属性选择区域
        function renderAttributeSelection(selectedFunctions) {
            const area = document.getElementById('attributeSelectionArea');
            if (!selectedFunctions || selectedFunctions.length === 0) {
                area.innerHTML = '';
                return;
            }
            
            let html = '<h3 style="margin-bottom: 15px;">选择各功能的属性</h3>';
            
            selectedFunctions.forEach(funcData => {
                const func = data.functions.find(f => f.id === funcData.functionId);
                if (!func || func.attrType === '无' || !func.attributes || func.attributes.length === 0) return;
                
                html += `
                    <div class="version-instance">
                        <h4 style="margin-bottom: 15px;">${func.name} - ${func.attrType}</h4>
                        <div class="selection-grid">
                `;
                
                func.attributes.forEach(attr => {
                    const isSelected = funcData.selectedAttrIds && funcData.selectedAttrIds.includes(attr.id);
                    const cardClass = func.attrType === '互斥属性' ? 'radio-card' : 'checkbox-card';
                    
                    html += `
                        <div class="selection-card ${cardClass} ${isSelected ? 'selected' : ''}" 
                             data-function-id="${func.id}" 
                             data-attr-id="${attr.id}"
                             onclick="toggleAttributeSelection(this, '${func.id}', '${attr.id}', '${func.attrType}')">
                            <h4>${attr.name}</h4>
                            <p>编码: ${attr.code}</p>
                        </div>
                    `;
                });
                
                html += '</div></div>';
            });
            
            area.innerHTML = html;
        }

        // 切换属性选择
        function toggleAttributeSelection(card, functionId, attrId, attrType) {
            if (attrType === '互斥属性') {
                // 互斥属性:取消同功能的其他选择
                document.querySelectorAll(`[data-function-id="${functionId}"][data-attr-id]`).forEach(c => {
                    c.classList.remove('selected');
                });
                card.classList.add('selected');
            } else {
                // 共享属性:可多选
                card.classList.toggle('selected');
            }
        }

        // 确认编辑版本
        function confirmEditVersion() {
            const devices = getCurrentProjectDevices();
            const device = devices.find(d => d.id === currentEditDevice);
            if (!device || currentEditVersionIndex === null) return;
            
            const version = device.versions[currentEditVersionIndex];
            
            // 获取选中的功能
            const selectedFunctionCards = document.querySelectorAll('#functionSelectionGrid .selection-card.selected');
            version.functions = [];
            
            selectedFunctionCards.forEach(card => {
                const functionId = card.dataset.functionId;
                const func = data.functions.find(f => f.id === functionId);
                
                // 获取该功能选中的属性
                const selectedAttrCards = document.querySelectorAll(`[data-function-id="${functionId}"][data-attr-id].selected`);
                const selectedAttrIds = Array.from(selectedAttrCards).map(c => c.dataset.attrId);
                
                version.functions.push({
                    functionId: functionId,
                    selectedAttrIds: selectedAttrIds
                });
            });
            
            saveData();
            renderDevices();
            renderDeviceDisplay();
            closeModal('editVersionModal');
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // 导出设备JSON
        function exportDeviceJson(deviceId) {
            const devices = getCurrentProjectDevices();
            const device = devices.find(d => d.id === deviceId);
            if (!device) {
                alert('设备不存在');
                return;
            }

            // 构建导出数据结构: {版本号: {功能编码: [属性编码数组]}}
            const exportData = {};

            if (device.versions && device.versions.length > 0) {
                device.versions.forEach(ver => {
                    const functionsObj = {};

                    if (ver.functions && ver.functions.length > 0) {
                        ver.functions.forEach(funcData => {
                            const func = data.functions.find(f => f.id === funcData.functionId);
                            if (func) {
                                const attributeCodes = [];

                                // 收集选中的属性编码
                                if (funcData.selectedAttrIds && funcData.selectedAttrIds.length > 0) {
                                    funcData.selectedAttrIds.forEach(attrId => {
                                        const attr = func.attributes.find(a => a.id === attrId);
                                        if (attr) {
                                            attributeCodes.push(attr.code);
                                        }
                                    });
                                }

                                functionsObj[func.code] = attributeCodes;
                            }
                        });
                    }

                    exportData[ver.versionNumber] = functionsObj;
                });
            }

            // 创建JSON文件并下载
            const jsonStr = JSON.stringify(exportData, null, 4);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${device.spcid}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 导出所有设备JSON
        function exportAllDevicesJson() {
            const devices = getCurrentProjectDevices();
            const projectName = getCurrentProjectName();

            if (devices.length === 0) {
                alert('当前项目暂无设备数据');
                return;
            }

            // 构建导出数据结构: {SPCID: {版本号: {功能编码: [属性编码数组]}}}
            const exportData = {};

            devices.forEach(device => {
                exportData[device.spcid] = {};

                if (device.versions && device.versions.length > 0) {
                    device.versions.forEach(ver => {
                        const functionsObj = {};

                        if (ver.functions && ver.functions.length > 0) {
                            ver.functions.forEach(funcData => {
                                const func = data.functions.find(f => f.id === funcData.functionId);
                                if (func) {
                                    const attributeCodes = [];

                                    // 收集选中的属性编码
                                    if (funcData.selectedAttrIds && funcData.selectedAttrIds.length > 0) {
                                        funcData.selectedAttrIds.forEach(attrId => {
                                            const attr = func.attributes.find(a => a.id === attrId);
                                            if (attr) {
                                                attributeCodes.push(attr.code);
                                            }
                                        });
                                    }

                                    functionsObj[func.code] = attributeCodes;
                                }
                            });
                        }

                        exportData[device.spcid][ver.versionNumber] = functionsObj;
                    });
                }
            });

            // 创建JSON文件并下载
            const jsonStr = JSON.stringify(exportData, null, 4);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentProject}_DeviceBusiness.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 删除设备版本
        function deleteDeviceVersion(deviceId, versionIndex) {
            if (!checkPermission('删除设备版本')) return;
            if (!confirm('确定要删除此版本吗?')) return;

            const devices = getCurrentProjectDevices();
            const device = devices.find(d => d.id === deviceId);
            if (!device) return;

            device.versions.splice(versionIndex, 1);
            saveData();
            renderDevices();
            renderDeviceDisplay();
        }

        // 编辑设备
        function editDevice(id) {
            if (!checkPermission('编辑设备')) return;

            const devices = getCurrentProjectDevices();
            const device = devices.find(d => d.id === id);
            if (!device) return;

            document.getElementById('deviceId').value = device.id;
            document.getElementById('deviceName').value = device.name;
            document.getElementById('deviceSpcid').value = device.spcid;
            document.getElementById('deviceType').value = device.deviceType || 'ring';

            document.querySelectorAll('.main-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.main-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.main-tab')[1].classList.add('active');
            document.getElementById('manage').classList.add('active');

            switchTab('device');
            document.getElementById('deviceName').focus();
        }

        // 编辑业务功能
        function editFunction(id) {
            if (!checkPermission('编辑业务功能')) return;
            
            const func = data.functions.find(f => f.id === id);
            if (!func) return;

            document.getElementById('functionId').value = func.id;
            document.getElementById('functionName').value = func.name;
            document.getElementById('functionCode').value = func.code;
            document.getElementById('functionAttrType').value = func.attrType;
            
            // 清空并重新填充属性列表
            document.getElementById('attributesList').innerHTML = '';
            if (func.attributes && func.attributes.length > 0) {
                func.attributes.forEach(attr => addAttributeInput(attr));
            }

            document.querySelectorAll('.main-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.main-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.main-tab')[1].classList.add('active');
            document.getElementById('manage').classList.add('active');

            switchTab('function');
            document.getElementById('functionName').focus();
        }

        // 删除设备
        function deleteDevice(id) {
            if (!checkPermission('删除设备')) return;
            if (!confirm('确定要删除此设备吗?')) return;
            const devices = getCurrentProjectDevices();
            const filteredDevices = devices.filter(d => d.id !== id);
            setCurrentProjectDevices(filteredDevices);
            renderProjectSwitcher();
            saveData();
            renderDevices();
            renderDeviceDisplay();
        }

        // 删除业务功能
        function deleteFunction(id) {
            if (!checkPermission('删除业务功能')) return;
            if (!confirm('确定要删除此业务功能吗?\n注意:所有使用此功能的设备版本都会受影响')) return;
            data.functions = data.functions.filter(f => f.id !== id);
            // 删除所有项目中的相关功能引用
            Object.keys(data.projects).forEach(projectId => {
                const projectDevices = data.projects[projectId].devices || [];
                projectDevices.forEach(d => {
                    if (d.versions) {
                        d.versions.forEach(v => {
                            if (v.functions) {
                                v.functions = v.functions.filter(f => f.functionId !== id);
                            }
                        });
                    }
                });
            });
            saveData();
            renderAll();
        }

        // 删除协议版本号
        function deleteVersionNumber(versionNumber) {
            if (!checkPermission('删除协议版本号')) return;
            if (!confirm('确定要删除此版本号吗?\n注意:所有使用此版本号的设备都会受影响')) return;
            data.versionNumbers = data.versionNumbers.filter(v => v !== versionNumber);
            // 删除所有项目中的相关版本引用
            Object.keys(data.projects).forEach(projectId => {
                const projectDevices = data.projects[projectId].devices || [];
                projectDevices.forEach(d => {
                    if (d.versions) {
                        d.versions = d.versions.filter(v => v.versionNumber !== versionNumber);
                    }
                });
            });
            saveData();
            renderAll();
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
